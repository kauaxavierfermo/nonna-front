<h1> reserva de mesa </h1>
<P>preencha os dados abaixo para simular uma reserva na cantina da nonna.</P>

<form>
    <fieldset>
        <legend>dados do cliente</legend>

<p>
    <label for="nome">nome completo:</label>
<br>
<input type="text" id="nome" name="nome" placeholder="ex.: maria silva " required minlength="3">
</p>


<p>
    <label for="email">e-mail:</label>
<br>
<input type="text" id="email" name="email" placeholder="ex.: maria@gmail.com" >
</p>



<p>
    <label for="telefone">telefone:</label>
<br>
<input type="text" id="telefone " name="telefone " placeholder="ex.: (48) 98765-321 ">
</p>








    </fieldset>

<fieldset>
    


    
    <p>
<label for="data">data da reserva:</label><br>
<input type="date" id="data " name="data " required>
</p>

<p>
<label for="horario">horário:</label><br>
<input type="time" id="horario" name="horario" required>
</p>

<p>
<label for="pessoas">quantidade de pessoas:</label><br>
<input type="number" id="pessoas " name="pessoas "  placeholder="ex.: 4" required min="1" max="20">
</p>



<P>Área desejada:</P>
<input type="radio" id="area-interna" name="area" value="interna" required>
<label for="area-interna">Área interna</label> <br>

<input type="radio" id="area-externa" name="area" value="externa" required>
<label for="area-externa">Área externa</label> <br>


<input type="radio" id="area-indiferente " name="area" value="indiferente" required>
<label for="area-indiferente">Área indiferente</label> <br>




<P>preferências:</P>
<input type="checkbox" id="cadeirao" name="preferencia" value="cadeirao" required>
<label for="cadeirao">preciso de cadeirão infantil </label> <br>

<input type="checkbox" id="aniversario" name="preferencias" value="aniversario" required>
<label for="aniversario">é uma comemoração de aniversário</label> <br>


<input type="checkbox" id="acessibilidade " name="preferencias" value="acessibilidade" required>
<label for="acessibilidade">preciso de acessibilidade</label> <br>

<P>
    <label for="observacoes">observações:</label><br>
    <textarea id="observacoes" name="observacoes" rows="4" cols="40" placeholder="ex.: mesa perto da janela"></textarea>
</P>


</fieldset>

<p>
    <input type="checkbox" id="confirmacao" name="confirmacao" required>

<Label for="confirmacao">comfirmo que os dados de reservas estão corretos </Label>


</p>

<button type="submit">enviar reserva</button>

<button type="reset">limpar formulário</button>
</form>
<a class="botao-reserva" href="reserva.html"> reservar mesa </a>
